<svg viewBox="0 0 920 384" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">The agent loop</title>
  <desc id="desc">An agent loop showing Reason, Act, and Observe connected in a repeating cycle.</desc>
  <defs>
    <marker id="aPurple" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8b5cf6"/>
    </marker>
  </defs>

  <rect x="8" y="8" width="904" height="368" rx="20" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>

  <text x="40" y="42" fill="#f8fafc" font-size="18" font-weight="600">The agent loop</text>
  <text x="40" y="63" fill="#94a3b8" font-size="13">Agents reason, act, observe results, and repeat until the task is complete.</text>

  <text x="40" y="98" fill="#94a3b8" font-size="12" font-weight="600" letter-spacing="0.5">ITERATIVE EXECUTION</text>

  <!-- loop connectors -->
  <path d="M570 136 C 680 146 738 184 738 236" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" marker-end="url(#aPurple)"/>
  <path d="M604 282 C 520 332 400 332 316 282" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" marker-end="url(#aPurple)"/>
  <path d="M182 236 C 182 184 240 146 350 136" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" marker-end="url(#aPurple)"/>

  <!-- cards -->
  <rect x="350" y="104" width="220" height="84" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="452" y="134" fill="#f8fafc" font-size="17" font-weight="600">Reason</text>
  <text x="452" y="158" fill="#94a3b8" font-size="13">LLM analyzes the goal</text>
  <text x="452" y="178" fill="#94a3b8" font-size="13">and current state</text>

  <rect x="616" y="228" width="220" height="84" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="718" y="258" fill="#f8fafc" font-size="17" font-weight="600">Act</text>
  <text x="718" y="282" fill="#94a3b8" font-size="13">Take an action</text>
  <text x="718" y="302" fill="#94a3b8" font-size="13">(using tools/APIs)</text>

  <rect x="84" y="228" width="220" height="84" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="186" y="258" fill="#f8fafc" font-size="17" font-weight="600">Observe</text>
  <text x="186" y="282" fill="#94a3b8" font-size="13">See the result and</text>
  <text x="186" y="302" fill="#94a3b8" font-size="13">update state</text>

  <!-- icons -->
  <circle cx="386" cy="146" r="24" fill="#8b5cf6" fill-opacity="0.12" stroke="#8b5cf6" stroke-opacity="0.55"/>
  <path d="M379 130c-6 0-10 4-10 9 0 2 1 4 3 6-2 2-3 4-3 7 0 5 4 9 9 9 4 0 7-2 8-5 1 3 4 5 8 5 5 0 9-4 9-9 0-3-1-5-3-7 2-2 3-4 3-6 0-5-4-9-10-9-3 0-6 2-7 4-1-2-4-4-7-4Z" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linejoin="round"/>
  <path d="M386 134v24M378 142h4M378 151h4M391 142h4M391 151h4" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/>

  <circle cx="652" cy="270" r="24" fill="#8b5cf6" fill-opacity="0.12" stroke="#8b5cf6" stroke-opacity="0.55"/>
  <path d="M639 283l25-25M639 283l-3-3M639 283l3 3M656 262l8 8M647 275l8 8M664 258l5-5M669 253l4 4" fill="none" stroke="#a78bfa" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M641 258l25 25M641 258l-5 5M641 258l5-5" fill="none" stroke="#a78bfa" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="120" cy="270" r="24" fill="#8b5cf6" fill-opacity="0.12" stroke="#8b5cf6" stroke-opacity="0.55"/>
  <path d="M101 270c5-10 12-15 20-15s15 5 20 15c-5 10-12 15-20 15s-15-5-20-15Z" fill="none" stroke="#a78bfa" stroke-width="2.2" stroke-linejoin="round"/>
  <circle cx="121" cy="270" r="6" fill="none" stroke="#a78bfa" stroke-width="2.2"/>

  <text x="40" y="344" fill="#94a3b8" font-size="12">Unlike fixed workflows, an agent chooses the next action from what it observes.</text>
</svg>
