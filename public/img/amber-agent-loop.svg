<svg viewBox="0 0 720 500" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="aSlate" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect x="8" y="8" width="704" height="484" rx="20" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>

  <text x="40" y="40" fill="#f8fafc" font-size="18" font-weight="600">The agent loop</text>
  <text x="40" y="62" fill="#94a3b8" font-size="13">Unlike a fixed workflow, an agent decides each step as it goes.</text>

  <!-- loop arrows (clockwise, four congruent arcs) -->
  <path d="M442,172 Q 524,196 480,248" fill="none" stroke="#64748b" stroke-width="1.8" marker-end="url(#aSlate)"/>
  <path d="M480,312 Q 524,364 442,388" fill="none" stroke="#64748b" stroke-width="1.8" marker-end="url(#aSlate)"/>
  <path d="M278,388 Q 196,364 240,312" fill="none" stroke="#64748b" stroke-width="1.8" marker-end="url(#aSlate)"/>
  <path d="M240,248 Q 196,196 278,172" fill="none" stroke="#64748b" stroke-width="1.8" marker-end="url(#aSlate)"/>

  <!-- center hub -->
  <circle cx="360" cy="280" r="48" fill="#1e293b" stroke="#334155"/>
  <text x="360" y="277" fill="#f8fafc" font-size="16" font-weight="600" text-anchor="middle">Agent</text>
  <text x="360" y="295" fill="#94a3b8" font-size="10" text-anchor="middle">LLM-driven</text>

  <!-- nodes -->
  <rect x="275" y="106" width="170" height="68" rx="12" fill="#1e293b" stroke="#334155"/>
  <text x="360" y="136" fill="#e2e8f0" font-size="14" font-weight="600" text-anchor="middle">Reason</text>
  <text x="360" y="155" fill="#94a3b8" font-size="11" text-anchor="middle">decides the next step</text>

  <rect x="475" y="246" width="170" height="68" rx="12" fill="#1e293b" stroke="#334155"/>
  <text x="560" y="276" fill="#e2e8f0" font-size="14" font-weight="600" text-anchor="middle">Take action</text>
  <text x="560" y="295" fill="#94a3b8" font-size="11" text-anchor="middle">picks a tool to call</text>

  <rect x="275" y="388" width="170" height="68" rx="12" fill="#1e293b" stroke="#334155"/>
  <text x="360" y="418" fill="#e2e8f0" font-size="14" font-weight="600" text-anchor="middle">Use tools</text>
  <text x="360" y="437" fill="#94a3b8" font-size="11" text-anchor="middle">runs the tool or API</text>

  <rect x="75" y="246" width="170" height="68" rx="12" fill="#1e293b" stroke="#334155"/>
  <text x="160" y="276" fill="#e2e8f0" font-size="14" font-weight="600" text-anchor="middle">Observe</text>
  <text x="160" y="295" fill="#94a3b8" font-size="11" text-anchor="middle">reads the result</text>
</svg>
