<svg viewBox="0 0 920 384" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="aSlate" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L6,3 L0,6 Z" fill="#475569"/></marker>
    <marker id="aRed" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L7,3 L0,6 Z" fill="#ef4444"/></marker>
  </defs>

  <rect x="8" y="8" width="904" height="368" rx="20" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>

  <text x="40" y="42" fill="#f8fafc" font-size="18" font-weight="600">The double-charge problem</text>
  <text x="40" y="63" fill="#94a3b8" font-size="13">After a crash, restarting from the beginning runs the charge a second time.</text>

  <!-- ROW 1: partial failure -->
  <text x="40" y="93" fill="#94a3b8" font-size="12" font-weight="600" letter-spacing="0.5">PARTIAL FAILURE</text>
  <rect x="40" y="104" width="160" height="54" rx="10" fill="#1e293b" stroke="#334155"/><text x="120" y="137" text-anchor="middle" font-size="13" fill="#e2e8f0">create order</text><rect x="236" y="104" width="160" height="54" rx="10" fill="#1e293b" stroke="#334155"/><text x="316" y="137" text-anchor="middle" font-size="13" fill="#e2e8f0">charge card $100</text><rect x="432" y="104" width="160" height="54" rx="10" fill="#1e293b" stroke="#334155"/><text x="512" y="137" text-anchor="middle" font-size="13" fill="#e2e8f0">send receipt</text>
  <line x1="200" y1="131" x2="236" y2="131" stroke="#475569" stroke-width="1.5" marker-end="url(#aSlate)"/>
  <line x1="396" y1="131" x2="432" y2="131" stroke="#475569" stroke-width="1.5" marker-end="url(#aSlate)"/>
  <circle cx="186" cy="108" r="9" fill="#10b981"/><path d="M182,108 l3,3 l5,-6" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/><circle cx="382" cy="108" r="9" fill="#10b981"/><path d="M378,108 l3,3 l5,-6" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/><circle cx="578" cy="108" r="9" fill="#ef4444"/><path d="M574.5,104.5 l7,7 M581.5,104.5 l-7,7" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <text x="316" y="178" fill="#34d399" font-size="11" text-anchor="middle">card charged $100</text>
  <text x="512" y="178" fill="#f87171" font-size="11" text-anchor="middle">process crashes</text>

  <!-- same charge runs again link -->
  <line x1="316" y1="158" x2="316" y2="226" stroke="#ef4444" stroke-width="1.6" stroke-dasharray="4 4" marker-end="url(#aRed)"/>
  <text x="332" y="196" fill="#f87171" font-size="11" text-anchor="start">same step runs again</text>

  <!-- retry into create order -->
  <line x1="120" y1="200" x2="120" y2="226" stroke="#ef4444" stroke-width="1.6" stroke-dasharray="4 4" marker-end="url(#aRed)"/>
  <text x="120" y="194" fill="#f87171" font-size="11" text-anchor="middle">retry from start</text>

  <!-- ROW 2: naive restart -->
  <text x="40" y="216" fill="#94a3b8" font-size="12" font-weight="600" letter-spacing="0.5">NAIVE RESTART</text>
  <rect x="40" y="228" width="160" height="54" rx="10" fill="#1e293b" stroke="#334155"/><text x="120" y="261" text-anchor="middle" font-size="13" fill="#e2e8f0">create order</text><rect x="236" y="228" width="160" height="54" rx="10" fill="#1e293b" stroke="#ef4444"/><text x="316" y="261" text-anchor="middle" font-size="13" fill="#e2e8f0">charge card $100</text><rect x="432" y="228" width="160" height="54" rx="10" fill="#1e293b" stroke="#334155"/><text x="512" y="261" text-anchor="middle" font-size="13" fill="#e2e8f0">send receipt</text>
  <line x1="200" y1="255" x2="236" y2="255" stroke="#475569" stroke-width="1.5" marker-end="url(#aSlate)"/>
  <line x1="396" y1="255" x2="432" y2="255" stroke="#475569" stroke-width="1.5" marker-end="url(#aSlate)"/>
  <circle cx="186" cy="232" r="9" fill="#10b981"/><path d="M182,232 l3,3 l5,-6" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/><circle cx="382" cy="232" r="9" fill="#ef4444"/><path d="M382,227.5 l0,5.5" stroke="#fff" stroke-width="2" stroke-linecap="round"/><circle cx="382" cy="236 " r="1.2" fill="#fff"/><circle cx="578" cy="232" r="9" fill="#10b981"/><path d="M574,232 l3,3 l5,-6" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="316" y="302" fill="#f87171" font-size="11" text-anchor="middle">card charged again</text>

  <!-- outcome -->
  <line x1="592" y1="255" x2="624" y2="255" stroke="#ef4444" stroke-width="1.5" marker-end="url(#aRed)"/>
  <rect x="624" y="228" width="184" height="54" rx="10" fill="#ef4444" fill-opacity="0.12" stroke="#ef4444" stroke-opacity="0.5"/>
  <text x="716" y="250" fill="#fca5a5" font-size="13" font-weight="600" text-anchor="middle">customer charged twice</text>
  <text x="716" y="268" fill="#f87171" font-size="11" text-anchor="middle">$100 + $100 = $200</text>

  <text x="40" y="344" fill="#94a3b8" font-size="12">Durable execution records each completed step, so on restart the charge is not run again.</text>
</svg>
